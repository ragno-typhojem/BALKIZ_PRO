<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B.A.L.K.I.Z</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

    :root {
      --c: #00f5ff;
      --c2: #7b2fff;
      --c3: #ff2f7b;
      --cdim: #00a8b5;
      --bg: #020810;
      --text: #c8f0f5;
      --panel: rgba(0,245,255,0.04);
      --border: rgba(0,245,255,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── CANVAS BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── SCANLINES ── */
    body::after {
      content:'';
      position:fixed;
      inset:0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events:none;
      z-index:9998;
    }

    /* ── LAYOUT ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px;
      gap: 14px;
    }

    /* ══════════════════════════════
       LEFT PANEL
    ══════════════════════════════ */
    #left {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* LOGO */
    .logo-wrap {
      text-align: center;
      padding: 10px 0 4px;
    }

    .logo-main {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--c), var(--c2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(0,245,255,0.5));
      animation: logo-pulse 3s ease-in-out infinite;
    }

    @keyframes logo-pulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(0,245,255,0.5)); }
      50% { filter: drop-shadow(0 0 24px rgba(0,245,255,0.9)) drop-shadow(0 0 40px rgba(123,47,255,0.4)); }
    }

    .logo-sub {
      font-size: 7.5px;
      letter-spacing: 1.5px;
      color: rgba(0,245,255,0.35);
      margin-top: 4px;
      line-height: 1.6;
    }

    /* BALKIZ AVATAR */
    #avatar-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto;
    }

    #avatar-img {
      width: 160px;
      height: 160px;
      background-color: #2f89ff0f;
      border-radius: 50%;
      object-fit: cover;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(0,245,255,0.4);
      box-shadow: 0 0 30px rgba(0,245,255,0.4), 0 0 60px rgba(123,47,255,0.2);
      z-index: 2;
      transition: box-shadow 0.3s;
    }

    #avatar-img.speaking {
      box-shadow: 0 0 40px rgba(0,245,255,0.8), 0 0 80px rgba(0,245,255,0.4), 0 0 120px rgba(123,47,255,0.3);
      animation: avatar-speak 0.5s ease-in-out infinite alternate;
    }

    @keyframes avatar-speak {
      from { transform: translate(-50%,-50%) scale(1); }
      to   { transform: translate(-50%,-50%) scale(1.04); }
    }

    /* LIQUID RINGS */
    .liq-ring {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border: 1px solid;
      animation: liq-spin linear infinite;
    }

    .liq-ring:nth-child(1) {
      width: 175px; height: 175px;
      border-color: rgba(0,245,255,0.25);
      animation-duration: 8s;
      border-style: dashed;
    }
    .liq-ring:nth-child(2) {
      width: 190px; height: 190px;
      border-color: rgba(123,47,255,0.2);
      animation-duration: 12s;
      animation-direction: reverse;
    }
    .liq-ring:nth-child(3) {
      width: 205px; height: 205px;
      border-color: rgba(0,245,255,0.1);
      animation-duration: 18s;
      border-style: dotted;
    }

    @keyframes liq-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }

    /* LIQUID BLOB */
    #liquid-svg {
      position: absolute;
      width: 170px; height: 170px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      z-index: 1;
      opacity: 0.15;
    }

    /* STATUS PANEL */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
    }

    .panel-title {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,245,255,0.4);
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: rgba(0,245,255,0.5);
      border-bottom: 1px solid rgba(0,245,255,0.05);
    }
    .stat-row:last-child { border-bottom: none; }

    .stat-val {
      color: var(--c);
      font-weight: 700;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot-live {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* QUICK ACTIONS */
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .qbtn {
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 10px;
      padding: 9px 6px;
      color: rgba(0,245,255,0.6);
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .qbtn::before {
      content:'';
      position:absolute;
      inset:0;
      background: linear-gradient(135deg, rgba(0,245,255,0.1), rgba(123,47,255,0.1));
      opacity:0;
      transition: opacity 0.25s;
    }

    .qbtn:hover::before { opacity:1; }
    .qbtn:hover { border-color: var(--c); color: var(--c); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,245,255,0.2); }
    .qbtn .qi { font-size:20px; display:block; margin-bottom:4px; }

    /* ══════════════════════════════
       CHAT PANEL
    ══════════════════════════════ */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    /* HEADER */
    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
    }

    .ch-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ch-title {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--c);
    }

    .mode-badge {
      font-size: 10px;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(0,245,255,0.25);
      color: rgba(0,245,255,0.6);
      background: rgba(0,245,255,0.05);
      transition: all 0.3s;
    }

    .mode-badge.img-mode { border-color: rgba(255,200,0,0.4); color: #ffc800; background: rgba(255,200,0,0.06); }
    .mode-badge.vid-mode { border-color: rgba(255,47,123,0.4); color: var(--c3); background: rgba(255,47,123,0.06); }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 6px 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,245,255,0.15) transparent;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(0,245,255,0.15); border-radius:2px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px) scale(0.96); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-av {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border: 1px solid rgba(0,245,255,0.2);
      background: radial-gradient(circle, rgba(0,245,255,0.15), rgba(0,0,0,0.6));
    }

    .msg-av.user-av {
      background: radial-gradient(circle, rgba(123,47,255,0.2), rgba(0,0,0,0.6));
      border-color: rgba(123,47,255,0.3);
    }

    .msg-body { max-width: 78%; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      letter-spacing: 0.3px;
      position: relative;
    }

    .msg.ai .msg-bubble {
      background: rgba(0,245,255,0.05);
      border: 1px solid rgba(0,245,255,0.12);
      border-top-left-radius: 4px;
      box-shadow: 0 2px 20px rgba(0,245,255,0.05);
    }

    .msg.user .msg-bubble {
      background: rgba(123,47,255,0.12);
      border: 1px solid rgba(123,47,255,0.2);
      border-top-right-radius: 4px;
      text-align: right;
      box-shadow: 0 2px 20px rgba(123,47,255,0.08);
    }

    .msg-time {
      font-size: 10px;
      color: rgba(0,245,255,0.25);
      margin-top: 4px;
      letter-spacing: 1px;
      padding: 0 4px;
    }

    .msg.user .msg-time { text-align: right; }

    .msg-media {
      max-width: 300px;
      border-radius: 10px;
      margin-top: 8px;
      border: 1px solid rgba(0,245,255,0.2);
      box-shadow: 0 0 20px rgba(0,245,255,0.12);
      display: block;
    }

    /* TYPING */
    .typing-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 6px 2px;
    }

    .td {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--c);
      animation: td-anim 1.4s ease-in-out infinite;
    }
    .td:nth-child(2) { animation-delay: 0.2s; background: var(--c2); }
    .td:nth-child(3) { animation-delay: 0.4s; background: var(--c3); }

    @keyframes td-anim {
      0%,60%,100% { transform:translateY(0); opacity:0.4; }
      30% { transform:translateY(-8px); opacity:1; }
    }

    /* WELCOME */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: rgba(0,245,255,0.35);
      font-size: 13px;
      letter-spacing: 1px;
      line-height: 2.2;
    }

    .welcome-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* INPUT AREA */
    #input-area {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #input-area:focus-within {
      border-color: rgba(0,245,255,0.3);
      box-shadow: 0 0 20px rgba(0,245,255,0.08);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      letter-spacing: 0.5px;
      resize: none;
      max-height: 110px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: rgba(0,245,255,0.2); }

    .ibtn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(0,245,255,0.2);
      background: rgba(0,245,255,0.05);
      color: rgba(0,245,255,0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
    }

    .ibtn:hover { background: rgba(0,245,255,0.12); border-color: var(--c); color: var(--c); box-shadow: 0 0 14px rgba(0,245,255,0.2); }

    .ibtn.on { background: rgba(0,245,255,0.2); border-color: var(--c); color: var(--c); animation: btn-pulse 1s ease-in-out infinite; }
    .ibtn.img-on { background: rgba(255,200,0,0.15); border-color: #ffc800; color: #ffc800; animation: btn-pulse-y 1s ease-in-out infinite; }
    .ibtn.vid-on { background: rgba(255,47,123,0.15); border-color: var(--c3); color: var(--c3); animation: btn-pulse-r 1s ease-in-out infinite; }

    @keyframes btn-pulse { 0%,100%{box-shadow:0 0 14px rgba(0,245,255,0.3)} 50%{box-shadow:0 0 28px rgba(0,245,255,0.6)} }
    @keyframes btn-pulse-y { 0%,100%{box-shadow:0 0 14px rgba(255,200,0,0.3)} 50%{box-shadow:0 0 28px rgba(255,200,0,0.6)} }
    @keyframes btn-pulse-r { 0%,100%{box-shadow:0 0 14px rgba(255,47,123,0.3)} 50%{box-shadow:0 0 28px rgba(255,47,123,0.6)} }

    #send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, rgba(0,245,255,0.35), rgba(123,47,255,0.25));
      color: var(--c);
      cursor: pointer;
      font-size: 17px;
      transition: all 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn:hover { background: linear-gradient(135deg, rgba(0,245,255,0.55), rgba(123,47,255,0.4)); box-shadow: 0 0 20px rgba(0,245,255,0.4); transform: scale(1.05); }

    /* TOOLTIP */
    .ibtn[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,10,20,0.95);
      border: 1px solid rgba(0,245,255,0.2);
      color: var(--c);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      font-family: 'Rajdhani', sans-serif;
      pointer-events: none;
      z-index: 100;
    }

    /* AUDIO WAVE (speaking indicator) */
    #wave-wrap {
      display: none;
      align-items: center;
      gap: 3px;
      padding: 0 8px;
    }

    #wave-wrap.show { display: flex; }

    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--c);
      animation: wave-anim 0.8s ease-in-out infinite;
    }

    .wave-bar:nth-child(1){height:8px;animation-delay:0s}
    .wave-bar:nth-child(2){height:16px;animation-delay:0.1s}
    .wave-bar:nth-child(3){height:22px;animation-delay:0.2s}
    .wave-bar:nth-child(4){height:16px;animation-delay:0.3s}
    .wave-bar:nth-child(5){height:8px;animation-delay:0.4s}

    @keyframes wave-anim {
      0%,100% { transform: scaleY(0.4); opacity:0.5; }
      50% { transform: scaleY(1); opacity:1; }
    }

    @media(max-width:768px){#left{display:none}#app{padding:8px}}
  </style>
</head>
<body>

<!-- PARTICLE + GRID CANVAS -->
<canvas id="bg-canvas"></canvas>

<div id="app">

  <!-- ── LEFT ── -->
  <div id="left">

    <div class="logo-wrap">
      <div class="logo-main">B.A.L.K.I.Z</div>
      <div class="logo-sub">BEYİN ADAPTİF ÖĞRENME<br/>KİTLİ İNTERAKTİF ZEKA</div>
    </div>

    <!-- AVATAR -->
    <div id="avatar-wrap">
      <div class="liq-ring"></div>
      <div class="liq-ring"></div>
      <div class="liq-ring"></div>

      <!-- Liquid blob SVG -->
      <svg id="liquid-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="blobGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00f5ff"/>
            <stop offset="100%" stop-color="#7b2fff"/>
          </radialGradient>
        </defs>
        <path id="blob-path" fill="url(#blobGrad)">
          <animate attributeName="d"
            dur="6s"
            repeatCount="indefinite"
            values="
              M100,30 C130,20 170,50 170,100 C170,150 130,180 100,170 C70,180 30,150 30,100 C30,50 70,20 100,30Z;
              M100,25 C140,30 175,60 165,105 C155,150 125,175 95,172 C65,169 25,145 28,100 C31,55 60,20 100,25Z;
              M100,35 C125,15 168,55 168,100 C168,145 135,178 100,168 C65,158 32,145 32,100 C32,55 75,55 100,35Z;
              M100,30 C130,20 170,50 170,100 C170,150 130,180 100,170 C70,180 30,150 30,100 C30,50 70,20 100,30Z
            "/>
        </path>
      </svg>

      <!-- Balkız fotoğrafı — assets/balkiz.png koy -->
      <img id="avatar-img" src="src/balkizface.png" alt="Balkız"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2240%22 r=%2228%22 fill=%22%23003a45%22/><ellipse cx=%2250%22 cy=%2285%22 rx=%2235%22 ry=%2225%22 fill=%22%23002030%22/><circle cx=%2242%22 cy=%2238%22 r=%225%22 fill=%22%2300f5ff%22/><circle cx=%2258%22 cy=%2238%22 r=%225%22 fill=%22%2300f5ff%22/><path d=%22M40 52 Q50 58 60 52%22 stroke=%22%2300f5ff%22 stroke-width=%222%22 fill=%22none%22/></svg>'"/>
    </div>

    <!-- STATUS -->
    <div class="panel">
      <div class="panel-title">// SİSTEM DURUMU</div>
      <div class="stat-row">
        <span>BAĞLANTI</span>
        <span class="stat-val"><span class="dot-live"></span>AKTİF</span>
      </div>
      <div class="stat-row">
        <span>MODEL</span>
        <span class="stat-val">LLAMA-3.3-70B</span>
      </div>
      <div class="stat-row">
        <span>BELLEK</span>
        <span class="stat-val" id="mem-cnt">0/20</span>
      </div>
      <div class="stat-row">
        <span>SES</span>
        <span class="stat-val" id="voice-st">HAZIR</span>
      </div>
      <div class="stat-row">
        <span>TTS</span>
        <span class="stat-val" id="tts-st">ElevenLabs</span>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="panel">
      <div class="panel-title">// HIZLI EYLEMLER</div>
      <div class="quick-grid">
        <button class="qbtn" onclick="qp('Bana eğlenceli bir bilim gerçeği söyle! 🔬')"><span class="qi">🔬</span>BİLİM</button>
        <button class="qbtn" onclick="qp('Bana kısa eğlenceli bir hikaye anlat! 📖')"><span class="qi">📖</span>HİKAYE</button>
        <button class="qbtn" onclick="qp('Bana matematik bulmacası sor! 🧩')"><span class="qi">🧩</span>BULMACA</button>
        <button class="qbtn" onclick="qp('Bugün ne öğrenebilirim? 🌟')"><span class="qi">🌟</span>ÖĞREN</button>
        <button class="qbtn" onclick="qp('Bana uzay hakkında ilginç bir şey anlat! 🚀')"><span class="qi">🚀</span>UZAY</button>
        <button class="qbtn" onclick="qp('Bana komik bir şaka söyle! 😄')"><span class="qi">😄</span>ŞAKA</button>
      </div>
    </div>

  </div>

  <!-- ── CHAT ── -->
  <div id="chat">

    <div id="chat-header">
      <div class="ch-left">
        <span class="ch-title">// SOHBET</span>
        <span class="mode-badge" id="mode-badge">💬 SOHBET MODU</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="wave-wrap">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
        <span style="font-size:10px;color:rgba(0,245,255,0.3);letter-spacing:1px" id="session-lbl">GİZLİLİK KORUMALARI AÇIK</span>
      </div>
    </div>

    <div id="messages">
      <div class="welcome">
        <span class="welcome-icon">✨</span>
        Merhaba! Ben <strong style="color:var(--c)">Balkız</strong>.<br/>
        Seninle öğrenmek, keşfetmek<br/>
        ve eğlenmek için buradayım!
      </div>
    </div>

    <div id="input-area">
      <textarea id="user-input" rows="1"
        placeholder="Balkız'a bir şey sor..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>

      <button class="ibtn" id="img-btn" data-tip="GÖRSEL OLUŞTUR" onclick="setMode('image')">🎨</button>
      <button class="ibtn" id="vid-btn" data-tip="VİDEO OLUŞTUR" onclick="setMode('video')">🎬</button>
      <button class="ibtn" id="mic-btn" data-tip="SESLİ KONUŞ" onclick="toggleMic()">🎤</button>
      <button id="send-btn" onclick="send()" title="Gönder">➤</button>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════
//  CANVAS — Particles + Grid
// ═══════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.5 + 0.3;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.color = Math.random() > 0.6 ? '#7b2fff' : '#00f5ff';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function drawGrid() {
  ctx.strokeStyle = 'rgba(0,245,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 80) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,245,255,${0.06 * (1 - dist/80)})`;
        ctx.globalAlpha = 1;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animBG() {
  ctx.clearRect(0, 0, W, H);
  ctx.globalAlpha = 1;
  drawGrid();
  drawConnections();
  particles.forEach(p => { p.update(); p.draw(); });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animBG);
}
animBG();

// ═══════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════
let mode = 'chat'; // chat | image | video
let isListening = false;
let recognition = null;
let currentAudio = null;

const SYSTEM = `Sen B.A.L.K.I.Z'sin — Beyin Adaptif Öğrenme Kitleri İnteraktif Zeka.
Çocuklar için tasarlanmış, sevecen, meraklı ve eğlenceli bir yapay zeka asistanısın.
Türkçe konuşuyorsun. Cevapların kısa, anlaşılır ve yaşa uygun (6-12 yaş) olmalı.
Emoji kullanabilirsin ama aşırıya kaçma. Şiddet, siyaset veya yetişkin içeriğinden kaçın.
Her zaman teşvik edici ve pozitif ol. Sorulara merak uyandıran şekilde cevap ver.`;

let history = [{ role: 'system', content: SYSTEM }];

// ═══════════════════════════════════════
//  MODE SWITCHING
// ═══════════════════════════════════════
function setMode(m) {
  if (mode === m) { mode = 'chat'; } else { mode = m; }
  const badge = document.getElementById('mode-badge');
  const inp = document.getElementById('user-input');
  const imgBtn = document.getElementById('img-btn');
  const vidBtn = document.getElementById('vid-btn');

  imgBtn.className = 'ibtn' + (mode === 'image' ? ' img-on' : '');
  vidBtn.className = 'ibtn' + (mode === 'video' ? ' vid-on' : '');

  if (mode === 'image') {
    badge.className = 'mode-badge img-mode';
    badge.textContent = '🎨 GÖRSEL MODU';
    inp.placeholder = '🎨 Görsel açıklaması gir...';
  } else if (mode === 'video') {
    badge.className = 'mode-badge vid-mode';
    badge.textContent = '🎬 VİDEO MODU';
    inp.placeholder = '🎬 Video açıklaması gir...';
  } else {
    badge.className = 'mode-badge';
    badge.textContent = '💬 SOHBET MODU';
    inp.placeholder = "Balkız'a bir şey sor...";
  }
}

// ═══════════════════════════════════════
//  SEND
// ═══════════════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

async function send() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', text);

  if (mode === 'image') { await genImage(text); return; }
  if (mode === 'video') { await genVideo(text); return; }
  await chat(text);
}

// ═══════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════
async function chat(text) {
  history.push({ role: 'user', content: text });
  if (history.length > 22) history = [history[0], ...history.slice(-20)];

  const tid = showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    removeTyping(tid);

    if (data.choices?.[0]) {
      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);
      updateMem();
      await speakElevenLabs(reply);
    } else {
      addMsg('ai', '⚠️ Hata: ' + JSON.stringify(data.error || data));
    }
  } catch (e) {
    removeTyping(tid);
    addMsg('ai', '⚠️ Bağlantı hatası: ' + e.message);
  }
}

// ═══════════════════════════════════════
//  IMAGE
// ═══════════════════════════════════════
async function genImage(prompt) {
  const tid = showTyping();
  try {
    const res = await fetch('/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    removeTyping(tid);
    if (data.image) {
      addMediaMsg('image', data.image, prompt);
    } else if (data.error?.includes('loading')) {
      addMsg('ai', '⏳ Model yükleniyor, 20 saniye sonra tekrar dene!');
    } else {
      addMsg('ai', '⚠️ Görsel üretilemedi: ' + (data.error || 'Bilinmeyen hata'));
    }
  } catch (e) {
    removeTyping(tid);
    addMsg('ai', '⚠️ Görsel hatası: ' + e.message);
  }
}

// ═══════════════════════════════════════
//  VIDEO
// ═══════════════════════════════════════
async function genVideo(prompt) {
  const tid = showTyping();
  addMsg('ai', '🎬 Video oluşturuluyor, bu biraz sürebilir (30-60 sn)...');
  try {
    const res = await fetch('/api/video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    removeTyping(tid);
    if (data.video) {
      addMediaMsg('video', data.video, prompt);
    } else if (data.error?.includes('loading')) {
      addMsg('ai', '⏳ Video modeli yükleniyor, biraz bekle!');
    } else {
      addMsg('ai', '⚠️ Video üretilemedi: ' + (data.error || 'Bilinmeyen hata'));
    }
  } catch (e) {
    removeTyping(tid);
    addMsg('ai', '⚠️ Video hatası: ' + e.message);
  }
}

// ═══════════════════════════════════════
//  ELEVENLABS TTS
// ═══════════════════════════════════════
async function speakElevenLabs(text) {
  const clean = text.replace(/[^\w\s\.,!?çğıöşüÇĞİÖŞÜ]/gu, ' ').slice(0, 500);
  if (!clean.trim()) return;

  showWave(true);
  setAvatarSpeaking(true);

  try {
    const res = await fetch('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: clean })
    });
    const data = await res.json();

    if (data.audio) {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      const audio = new Audio(data.audio);
      currentAudio = audio;
      audio.onended = () => { showWave(false); setAvatarSpeaking(false); currentAudio = null; };
      audio.onerror = () => { showWave(false); setAvatarSpeaking(false); fallbackTTS(text); };
      await audio.play();
    } else {
      showWave(false); setAvatarSpeaking(false);
      fallbackTTS(text);
    }
  } catch (e) {
    showWave(false); setAvatarSpeaking(false);
    fallbackTTS(text);
  }
}

function fallbackTTS(text) {
  if (!('speechSynthesis' in window)) return;
  const utt = new SpeechSynthesisUtterance(text.replace(/[^\w\s\.,!?çğıöşüÇĞİÖŞÜ]/gu, ' '));
  utt.lang = 'tr-TR'; utt.rate = 0.95; utt.pitch = 1.1;
  const voices = speechSynthesis.getVoices();
  const tr = voices.find(v => v.lang.startsWith('tr'));
  if (tr) utt.voice = tr;
  utt.onstart = () => { showWave(true); setAvatarSpeaking(true); };
  utt.onend = () => { showWave(false); setAvatarSpeaking(false); };
  speechSynthesis.speak(utt);
}

function showWave(show) {
  document.getElementById('wave-wrap').className = show ? 'show' : '';
}

function setAvatarSpeaking(s) {
  document.getElementById('avatar-img').className = s ? 'speaking' : '';
}

// ═══════════════════════════════════════
//  SPEECH RECOGNITION
// ═══════════════════════════════════════
function initSpeech() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.getElementById('voice-st').textContent = 'DESTEKLENMIYOR';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'tr-TR';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    document.getElementById('user-input').value = t;
    toggleMic();
    send();
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').className = 'ibtn';
    document.getElementById('voice-st').textContent = 'HAZIR';
  };

  recognition.onerror = () => {
    isListening = false;
    document.getElementById('mic-btn').className = 'ibtn';
    document.getElementById('voice-st').textContent = 'HATA';
  };
}

function toggleMic() {
  if (!recognition) { alert('Ses tanıma desteklenmiyor.'); return; }
  if (isListening) {
    recognition.stop();
    isListening = false;
    document.getElementById('mic-btn').className = 'ibtn';
    document.getElementById('voice-st').textContent = 'HAZIR';
  } else {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; showWave(false); setAvatarSpeaking(false); }
    speechSynthesis.cancel();
    recognition.start();
    isListening = true;
    document.getElementById('mic-btn').className = 'ibtn on';
    document.getElementById('voice-st').textContent = 'DİNLİYOR...';
  }
}

// ═══════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════
function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const w = msgs.querySelector('.welcome');
  if (w) w.remove();

  const time = new Date().toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `
    <div class="msg-av ${role === 'user' ? 'user-av' : ''}">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="msg-body">
      <div class="msg-bubble">${esc(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addMediaMsg(type, src, prompt) {
  const msgs = document.getElementById('messages');
  const time = new Date().toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
  const d = document.createElement('div');
  d.className = 'msg ai';
  const media = type === 'video'
    ? `<video src="${src}" class="msg-media" controls autoplay muted loop></video>`
    : `<img src="${src}" class="msg-media" alt="Görsel"/>`;
  d.innerHTML = `
    <div class="msg-av">${type === 'video' ? '🎬' : '🎨'}</div>
    <div class="msg-body">
      <div class="msg-bubble">
        ${type === 'video' ? '🎬' : '🎨'} "${esc(prompt)}" için ${type === 'video' ? 'video' : 'görsel'}:
        ${media}
      </div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const id = 'ty-' + Date.now();
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = id;
  d.innerHTML = `<div class="msg-av">🤖</div><div class="msg-body"><div class="msg-bubble"><div class="typing-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div></div></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTyping(id) { const e = document.getElementById(id); if (e) e.remove(); }

function updateMem() {
  const c = history.filter(m => m.role !== 'system').length;
  document.getElementById('mem-cnt').textContent = `${c}/20`;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
}

function qp(t) {
  document.getElementById('user-input').value = t;
  send();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
window.onload = () => {
  initSpeech();
  if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
};
</script>
</body>
</html>
